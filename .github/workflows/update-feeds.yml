name: Update XML feeds (Pages)

on:
  schedule:
    - cron: "42 * * * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Пересобрать все фиды, игнорируя interval_hours"
        required: false
        default: "false"
        type: boolean
  push:
    paths:
      - "data/projects.json"
      - "scripts/update_all_feeds.py"
      - ".github/workflows/update-feeds.yml"

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate feeds
        env:
          FORCE_REFRESH: ${{ github.event_name == 'push' && 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_refresh && 'true') || '' }}
        run: python scripts/update_all_feeds.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds data/state.json feeds/index.json
          if git diff --staged --quiet; then
            echo "No feed changes"
          else
            git commit -m "chore: update generated XML feeds"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
